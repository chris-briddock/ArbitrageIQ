name: Demo CI/CD

on:
  push:
    branches: [main]
    paths:
      - "src/demo/**"
      - ".github/workflows/demo.yml"

permissions:
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
  ECS_TASK_DEFINITION: ${{ secrets.ECS_TASK_DEFINITION }}
  CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}

jobs:
  # ─── Check infra ───────────────────────────────────────────────────────────
  # Blocks the pipeline if the infra workflow has never completed successfully
  # on main. Prevents deploying an app onto infrastructure that doesn't exist.
  check-infra:
    name: Check infra deployed
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read   # read infra workflow run status
    steps:
      - name: Verify last infra run succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONCLUSION=$(gh api \
            "/repos/${{ github.repository }}/actions/workflows/infra.yml/runs?branch=main&status=completed&head_sha=${{ github.sha }}&per_page=1" \
            --jq '.workflow_runs[0].conclusion // empty')

          if [[ "$CONCLUSION" != "success" ]]; then
            echo "::error::The Infrastructure workflow has not completed successfully on main."
            echo "::error::Run the infra pipeline first, then re-trigger this workflow."
            exit 1
          fi

  # ─── CI ────────────────────────────────────────────────────────────────────
  # Runs on every push and pull request that touches src/demo.
  ci:
    name: CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: src/demo
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  # ─── Build & Push ──────────────────────────────────────────────────────────
  # Builds the Docker image and pushes it to ECR.
  # Only runs on pushes to main after CI passes.
  build-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [ci, check-infra]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write # OIDC token for AWS credential federation
    outputs:
      image: ${{ steps.build-push.outputs.image }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2

      - name: Build, tag, and push image to ECR
        id: build-push
        working-directory: src/demo
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  # ─── Deploy ────────────────────────────────────────────────────────────────
  # Registers a new task definition revision and updates the ECS service.
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      contents: read
      id-token: write # OIDC token for AWS credential federation
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "$ECS_TASK_DEFINITION" \
            --query taskDefinition \
            > task-definition.json

      - name: Render updated task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb # v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ needs.build-push.outputs.image }}

      - name: Deploy to ECS service
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c # v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
