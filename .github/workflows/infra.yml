name: Infrastructure

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"

permissions:
  contents: read
  id-token: write      # OIDC token for AWS credential federation
  pull-requests: write # post plan output as a PR comment
  secrets: write       # sync tofu outputs → GitHub secrets after apply

env:
  TOFU_VERSION: "1.8.0"
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  # ─── Plan ──────────────────────────────────────────────────────────────────
  # Runs on every PR. Bootstraps the backend, plans, and posts the diff as a
  # comment so reviewers can see exactly what will change before approving.
  plan:
    name: Plan
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap state backend
        id: bootstrap
        working-directory: infra/bootstrap
        run: |
          tofu init -input=false -reconfigure
          tofu apply -auto-approve -input=false
          echo "bucket=$(tofu output -raw state_bucket)"     >> "$GITHUB_OUTPUT"
          echo "table=$(tofu output -raw lock_table)"        >> "$GITHUB_OUTPUT"
          echo "region=$(tofu output -raw aws_region)"       >> "$GITHUB_OUTPUT"

      - name: Init
        working-directory: infra
        run: |
          tofu init -input=false -reconfigure \
            -backend-config="bucket=${{ steps.bootstrap.outputs.bucket }}" \
            -backend-config="key=arbitrageiq-demo/terraform.tfstate" \
            -backend-config="region=${{ steps.bootstrap.outputs.region }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.table }}" \
            -backend-config="encrypt=true"

      - name: Plan
        id: plan
        working-directory: infra
        run: tofu plan -input=false -no-color 2>&1 | tee /tmp/plan.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs')
            const plan = fs.readFileSync('/tmp/plan.txt', 'utf8')
            const MAX  = 65_000
            const body = plan.length > MAX
              ? plan.slice(0, MAX) + '\n...(truncated — see full output in the Actions log)'
              : plan

            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
            })

            const marker  = '<!-- tofu-plan -->'
            const existing = comments.find(c => c.body.includes(marker))
            const newBody  = `${marker}\n#### OpenTofu Plan\n\`\`\`\n${body}\n\`\`\``

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body:       newBody,
              })
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: context.issue.number,
                body:         newBody,
              })
            }

      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: exit 1

  # ─── Setup environment ─────────────────────────────────────────────────────
  # Creates (or updates) the `production` GitHub Environment before the apply
  # job references it. Restricts deployments to the main branch only.
  setup-env:
    name: Create GitHub Environment
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Create production environment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create / update the environment.
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/environments/production" \
            --field 'deployment_branch_policy[protected_branches]=false' \
            --field 'deployment_branch_policy[custom_branch_policies]=true' \
            --silent

          # Add a deployment branch policy for main if one does not exist yet.
          EXISTING=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/environments/production/deployment-branch-policies" \
            --jq '.branch_policies[].name' 2>/dev/null || echo "")

          if ! echo "$EXISTING" | grep -qx "main"; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/environments/production/deployment-branch-policies" \
              --field 'name=main' \
              --field 'type=branch' \
              --silent
          fi

  # ─── Apply ─────────────────────────────────────────────────────────────────
  # Runs only on push to main, after the environment has been provisioned.
  # Add required reviewers in GitHub Settings → Environments → production
  # to introduce a manual approval gate before the apply proceeds.
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: setup-env
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Bootstrap state backend
        id: bootstrap
        working-directory: infra/bootstrap
        run: |
          tofu init -input=false -reconfigure
          tofu apply -auto-approve -input=false
          echo "bucket=$(tofu output -raw state_bucket)"  >> "$GITHUB_OUTPUT"
          echo "table=$(tofu output -raw lock_table)"     >> "$GITHUB_OUTPUT"
          echo "region=$(tofu output -raw aws_region)"    >> "$GITHUB_OUTPUT"

      - name: Init
        working-directory: infra
        run: |
          tofu init -input=false -reconfigure \
            -backend-config="bucket=${{ steps.bootstrap.outputs.bucket }}" \
            -backend-config="key=arbitrageiq-demo/terraform.tfstate" \
            -backend-config="region=${{ steps.bootstrap.outputs.region }}" \
            -backend-config="dynamodb_table=${{ steps.bootstrap.outputs.table }}" \
            -backend-config="encrypt=true"

      - name: Apply
        working-directory: infra
        run: tofu apply -auto-approve -input=false

      - name: Sync outputs to GitHub secrets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: infra
        run: |
          gh secret set ECR_REPOSITORY      --body "$(tofu output -raw ecr_repository_name)"
          gh secret set ECS_CLUSTER         --body "$(tofu output -raw ecs_cluster_name)"
          gh secret set ECS_SERVICE         --body "$(tofu output -raw ecs_service_name)"
          gh secret set ECS_TASK_DEFINITION --body "$(tofu output -raw task_definition_family)"
          gh secret set CONTAINER_NAME      --body "web"
